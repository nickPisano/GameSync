name: Release

# Build the native (webview-free) egui app for every OS/arch, package OS
# installers from it with cargo-packager, and attach both the installers and a
# raw "portable" binary to a draft GitHub release. Trigger by pushing a tag:
#   git tag v0.3.0 && git push origin v0.3.0
#
# Produced per target:
#   macOS  (universal arm64+x64) : .dmg installer  + portable fat binary
#   Windows x64 / arm64          : .msi + setup .exe + portable .exe (static CRT,
#                                  no VC++ redistributable and no WebView2)
#   Linux  x64 / arm64           : .deb + .AppImage + portable ELF binary
#
# Builds are unsigned. (.rpm is the one old Tauri format cargo-packager can't
# produce; Fedora/RHEL users can use the .AppImage. Code signing is opt-in and
# documented in docs/BUILDING.md.)

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-universal
            os: macos-latest
            rust-targets: aarch64-apple-darwin x86_64-apple-darwin
            formats: dmg
          - name: windows-x64
            os: windows-latest
            rustflags: -C target-feature=+crt-static
            formats: wix nsis
          - name: windows-arm64
            os: windows-11-arm
            rustflags: -C target-feature=+crt-static
            formats: wix nsis
          - name: linux-x64
            os: ubuntu-22.04
            formats: deb appimage
          - name: linux-arm64
            os: ubuntu-22.04-arm
            formats: deb appimage
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # egui/winit + AppImage build dependencies (no WebView2/WebKit needed).
      - name: Install Linux build deps
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev libfuse2

      - uses: dtolnay/rust-toolchain@stable

      - name: Add extra Rust targets (macOS universal)
        if: matrix.rust-targets != ''
        run: rustup target add ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-packager
        run: cargo install cargo-packager --version 0.11.8 --locked

      - name: Build (host target)
        if: matrix.rust-targets == ''
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo build --release -p gamesync-gui

      - name: Build universal macOS binary
        if: matrix.rust-targets != ''
        run: |
          cargo build --release -p gamesync-gui --target aarch64-apple-darwin
          cargo build --release -p gamesync-gui --target x86_64-apple-darwin
          # cargo-packager (no --target) looks for the binary in target/release,
          # so place the fat binary there.
          lipo -create -output target/release/gamesync-gui \
            target/aarch64-apple-darwin/release/gamesync-gui \
            target/x86_64-apple-darwin/release/gamesync-gui

      - name: Package installers
        shell: bash
        run: |
          fmt_args=""
          for f in ${{ matrix.formats }}; do fmt_args="$fmt_args -f $f"; done
          cargo packager --release -p gamesync-gui $fmt_args --verbose

      - name: Collect release assets
        shell: bash
        run: |
          ver="${GITHUB_REF_NAME#v}"
          mkdir -p out
          # The portable (raw) binary.
          case "${{ matrix.name }}" in
            macos-universal) cp target/release/gamesync-gui "out/GameSync_${ver}_macos-universal" ;;
            windows-*)       cp target/release/gamesync-gui.exe "out/GameSync_${ver}_${{ matrix.name }}-portable.exe" ;;
            *)               cp target/release/gamesync-gui "out/GameSync_${ver}_${{ matrix.name }}" ;;
          esac
          # The installers cargo-packager produced (in target/release).
          find target/release -maxdepth 1 -type f \
            \( -name '*.dmg' -o -name '*.msi' -o -name '*-setup.exe' \
               -o -name '*.deb' -o -name '*.AppImage' \) -exec cp {} out/ \;
          # The macOS fat dmg is named by host arch (aarch64) — relabel universal.
          for f in out/*_aarch64.dmg; do
            [ -e "$f" ] && mv "$f" "${f/_aarch64.dmg/_universal.dmg}"
          done
          ls -l out

      - name: Publish to draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: GameSync ${{ github.ref_name }}
          draft: true
          files: out/*
          fail_on_unmatched_files: true
          body: |
            ## Which file should I download?

            Not sure? Most people want the **installer** for their system:

            | Your computer | Download this file |
            | --- | --- |
            | **Windows** (most PCs) | `…_windows-x64_…-setup.exe` (or the `.msi`) |
            | **Windows on ARM** | `…_windows-arm64_…-setup.exe` |
            | **macOS** (Intel *or* Apple Silicon) | `…_universal.dmg` |
            | **Linux** (Debian/Ubuntu) | `…_amd64.deb` |
            | **Linux** (other distros / portable) | `…_x86_64.AppImage` (`chmod +x`, then run) |
            | **Linux on ARM** | `…_arm64.deb` or `…_aarch64.AppImage` |

            **Prefer no install?** Grab the `…-portable.exe` (Windows) or the bare
            `GameSync_…_macos-universal` / `…_linux-*` binary and just run it
            (`chmod +x` it first on macOS/Linux).

            > These builds are unsigned, so on first launch Windows SmartScreen or
            > macOS Gatekeeper may warn you. Choose **More info → Run anyway**
            > (Windows) or right-click → **Open** (macOS).
