name: Release

# Build installable + portable bundles for every OS/arch and attach them to a
# draft GitHub release. Trigger by pushing a version tag:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Produced per target:
#   macOS  (universal arm64+x64) : .dmg (installer) + .app (portable, in the dmg)
#   Windows x64 / arm64          : .msi + NSIS setup .exe (installers) + bare .exe (portable)
#   Linux  x64 / arm64           : .deb + .rpm (installers) + .AppImage (portable)
#
# Code signing is opt-in via secrets (none required for an unsigned build):
#   macOS:   APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID
#   updater: TAURI_SIGNING_PRIVATE_KEY, TAURI_SIGNING_PRIVATE_KEY_PASSWORD
# See docs/BUILDING.md.

on:
  push:
    tags: ['v*']

# The GITHUB_TOKEN must be able to create the release and upload assets.
# (Repo default may be read-only; this grants write just for this workflow.)
permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (universal)
            os: macos-latest
            rust-targets: aarch64-apple-darwin x86_64-apple-darwin
            args: --target universal-apple-darwin
          - name: Windows x64
            os: windows-latest
            args: ''
          - name: Windows arm64
            os: windows-11-arm
            args: ''
          - name: Linux x64
            os: ubuntu-22.04
            args: ''
          - name: Linux arm64
            os: ubuntu-22.04-arm
            args: ''
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux WebView/Tauri deps
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libssl-dev

      - uses: dtolnay/rust-toolchain@stable

      - name: Add extra Rust targets
        if: matrix.rust-targets != ''
        run: rustup target add ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend deps
        run: npm ci

      - name: Build & publish bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Ad-hoc sign on macOS ("-") when no Developer ID secret is set, so the
          # build succeeds unsigned. Set the APPLE_SIGNING_IDENTITY secret to a
          # real "Developer ID Application: …" value for a trusted build, and add
          # APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID here for notarization (see
          # docs/BUILDING.md). Don't pass those three empty — empty creds make
          # notarization fail.
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY || '-' }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'GameSync ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          # Steer non-technical users to the right asset. Same text in every
          # matrix job (idempotent); shown as the release description above the
          # asset list. Files are named by suffix so this stays version-correct.
          releaseBody: |
            ## Which file should I download?

            Not sure? Most people just want the **installer** for their system:

            | Your computer | Download this file |
            | --- | --- |
            | **Windows** (most PCs) | the file ending in **`_x64-setup.exe`** |
            | **Windows on ARM** | **`_arm64-setup.exe`** |
            | **macOS** (Intel *or* Apple Silicon) | **`_universal.dmg`** |
            | **Linux** (most distros) | **`_amd64.AppImage`** (run `chmod +x` on it, then launch) |
            | **Linux on ARM** | **`_aarch64.AppImage`** |

            **Prefer no install?** On Windows grab the `...-portable.exe` and just double-click it; the Linux `.AppImage` is already portable. **Debian/Ubuntu** can use the `.deb`, **Fedora/RHEL** the `.rpm`; the `.msi` is mainly for managed/enterprise installs.

            > These builds are unsigned, so on first launch Windows SmartScreen or macOS Gatekeeper may warn you. Choose **More info -> Run anyway** (Windows) or right-click the app -> **Open** (macOS). Not sure if you need x64 or ARM? On Windows see **Settings -> System -> About -> System type**.

      # tauri-action attaches the installers (.msi/.exe/.deb/.rpm/.AppImage/.dmg)
      # but not the raw Windows executable, which is the "portable" build.
      - name: Attach portable Windows .exe
        if: runner.os == 'Windows'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          arch=$(echo "${{ runner.arch }}" | tr 'A-Z' 'a-z')
          ver="${{ github.ref_name }}"; ver="${ver#v}"
          # The compiled binary is the cargo bin name (gamesync-app), not the
          # product name; Tauri only renames it inside the installers.
          exe=$(find target -path '*release/gamesync-app.exe' ! -path '*deps*' | head -n1)
          if [ -z "$exe" ]; then echo "::error::portable gamesync-app.exe not found under target/"; exit 1; fi
          out="GameSync_${ver}_${arch}-portable.exe"
          cp "$exe" "$out"
          gh release upload "${{ github.ref_name }}" "$out" --clobber
