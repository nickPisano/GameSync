name: Release

# Build the native (webview-free) egui app for every OS/arch and attach the
# binaries to a draft GitHub release. Trigger by pushing a version tag:
#   git tag v0.3.0 && git push origin v0.3.0
#
# Produced per target:
#   macOS  (universal arm64+x64) : a single fat binary
#   Windows x64 / arm64          : a portable .exe (statically-linked CRT, no
#                                  VC++ redistributable and no WebView2)
#   Linux  x64 / arm64           : a bare ELF binary
#
# These are raw, unsigned executables. Native OS installers (.dmg/.msi/.deb/
# .AppImage) were produced by Tauri and are no longer built; they can be
# re-added later with a Rust bundler (e.g. cargo-bundle) if desired.

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-universal
            os: macos-latest
            rust-targets: aarch64-apple-darwin x86_64-apple-darwin
          - name: windows-x64
            os: windows-latest
            # Statically link the MSVC C runtime so the portable .exe needs no
            # VC++ redistributable — only core Windows DLLs (no WebView2 either).
            rustflags: -C target-feature=+crt-static
          - name: windows-arm64
            os: windows-11-arm
            rustflags: -C target-feature=+crt-static
          - name: linux-x64
            os: ubuntu-22.04
          - name: linux-arm64
            os: ubuntu-22.04-arm
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # egui/winit Linux build dependencies (no WebView2/WebKit needed).
      - name: Install Linux GUI build deps
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev

      - uses: dtolnay/rust-toolchain@stable

      - name: Add extra Rust targets (macOS universal)
        if: matrix.rust-targets != ''
        run: rustup target add ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2

      - name: Build (host target)
        if: matrix.rust-targets == ''
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo build --release -p gamesync-gui

      - name: Build universal macOS binary
        if: matrix.rust-targets != ''
        run: |
          cargo build --release -p gamesync-gui --target aarch64-apple-darwin
          cargo build --release -p gamesync-gui --target x86_64-apple-darwin
          lipo -create -output gamesync-gui-macos-universal \
            target/aarch64-apple-darwin/release/gamesync-gui \
            target/x86_64-apple-darwin/release/gamesync-gui

      - name: Stage binary for upload
        shell: bash
        run: |
          ver="${GITHUB_REF_NAME#v}"
          mkdir -p out
          case "${{ matrix.name }}" in
            macos-universal) cp gamesync-gui-macos-universal "out/GameSync_${ver}_macos-universal" ;;
            windows-*)       cp target/release/gamesync-gui.exe "out/GameSync_${ver}_${{ matrix.name }}-portable.exe" ;;
            *)               cp target/release/gamesync-gui "out/GameSync_${ver}_${{ matrix.name }}" ;;
          esac
          ls -l out

      - name: Publish to draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: GameSync ${{ github.ref_name }}
          draft: true
          files: out/*
          fail_on_unmatched_files: true
          body: |
            ## Which file should I download?

            | Your computer | Download this file |
            | --- | --- |
            | **Windows** (most PCs) | the file ending in **`_windows-x64-portable.exe`** |
            | **Windows on ARM** | **`_windows-arm64-portable.exe`** |
            | **macOS** (Intel *or* Apple Silicon) | **`_macos-universal`** |
            | **Linux** (most distros) | **`_linux-x64`** |
            | **Linux on ARM** | **`_linux-arm64`** |

            These are portable, unsigned executables — no installer needed. On
            Linux/macOS, make the file executable (`chmod +x`) then run it. On
            first launch Windows SmartScreen or macOS Gatekeeper may warn you:
            choose **More info → Run anyway** (Windows) or right-click → **Open**
            (macOS).
