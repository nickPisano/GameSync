name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Native egui/winit build dependencies (no WebView2/WebKit/Tauri).
      - name: Install Linux GUI build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libgtk-3-dev libxdo-dev \
            libayatana-appindicator3-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Rust formatting
        run: cargo fmt --all --check

      - name: Rust tests
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --workspace --all-targets

      - name: Build native GUI
        run: cargo build --release -p gamesync-gui
